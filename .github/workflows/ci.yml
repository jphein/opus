name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML exists
        run: test -f index.html

      - name: Check HTML structure
        run: |
          grep -q '<!DOCTYPE html>' index.html || grep -q '<!doctype html>' index.html
          grep -q '<html' index.html
          grep -q '</html>' index.html
